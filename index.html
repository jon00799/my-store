<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jon00799 | Mega Store</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f4; margin: 0; padding: 0; }
        .header { background-color: #0067b8; color: white; padding: 15px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .search-container { background: white; border-radius: 4px; padding: 5px; margin-top: 10px; display: flex; }
        .search-container input { border: none; width: 100%; padding: 8px; outline: none; }
        .main-content { padding: 15px; max-width: 800px; margin: auto; }
        .app-item { background: white; display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #eee; margin-bottom: 5px; border-radius: 8px; }
        .app-icon { font-size: 30px; margin-right: 15px; background: #f0f0f0; padding: 10px; border-radius: 12px; }
        .app-details { flex-grow: 1; }
        .app-title { font-weight: bold; color: #0067b8; display: block; }
        .app-desc { font-size: 12px; color: #666; }
        /* Download Button stays on your site */
        .download-btn { background-color: #0067b8; color: white; padding: 10px 15px; border-radius: 5px; text-decoration: none; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body>

<div class="header">
    <h1 style="margin:0; font-size: 20px;">Jon00799 App Store</h1>
    <div class="search-container">
        <input type="text" id="searchInput" onkeyup="searchApps()" placeholder="Search 100+ apps...">
    </div>
</div>

<div class="main-content" id="appGrid">
    </div>

<script>
// Yahan aap jitni chahe apps add kar sakte hain, hazaar line likhne ki zaroorat nahi
const apps = [
    { name: "Termux", desc: "Linux Terminal Emulator", icon: "💻", link: "https://github.com/termux/termux-app/releases/download/v0.118.0/termux-app_v0.118.0+github-debug_arm64-v8a.apk" },
    { name: "Tor Browser", desc: "Private Browsing", icon: "🧅", link: "https://dist.torproject.org/torbrowser/13.0.10/tor-browser-android-aarch64-13.0.10.apk" },
    { name: "Orbot", desc: "Tor Proxy Tool", icon: "🤖", link: "https://guardianproject.info/releases/Orbot-latest.apk" },
    { name: "NetHunter Store", desc: "Security App Store", icon: "🐉", link: "https://store.nethunter.com/NetHunterStore.apk" },
    { name: "InviZible Pro", desc: "DNS & Privacy Tool", icon: "🛡️", link: "https://f-droid.org/repo/pavel.asatryan.invizible_5901.apk" },
    { name: "LADB", desc: "Local ADB Shell", icon: "🐚", link: "https://github.com/tytydraco/LADB/releases/download/v1.9.1/LADB_1.9.1.apk" }
    // Nayi apps bas yahan ek line mein add karte jayein
];

function displayApps(filter = "") {
    const grid = document.getElementById('appGrid');
    grid.innerHTML = "";
    apps.forEach(app => {
        if(app.name.toLowerCase().includes(filter.toLowerCase())) {
            grid.innerHTML += `
                <div class="app-item">
                    <div class="app-icon">${app.icon}</div>
                    <div class="app-details">
                        <span class="app-title">${app.name}</span>
                        <span class="app-desc">${app.desc}</span>
                    </div>
                    <a href="${app.link}" class="download-btn" download>DOWNLOAD</a>
                </div>
            `;
        }
    });
}

function searchApps() {
    displayApps(document.getElementById('searchInput').value);
}

// Load apps on startup
displayApps();
</script>

</body>
</html>
